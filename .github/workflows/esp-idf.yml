name: ESP-IDF build and tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        esp_idf_version:
          - v6.0.1
          - v5.5
          - v5.4

    name: ESP-IDF ${{ matrix.esp_idf_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build and run tests
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ matrix.esp_idf_version }}
          target: linux
          path: test_app
          command: |
            idf.py --preview set-target linux
            idf.py build
            idf.py monitor